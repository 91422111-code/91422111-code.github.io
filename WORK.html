<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習心得文案 — 高雄城市地標深度探索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
  background:#f4f4f9;color:#333;line-height:1.8;
  transition:background 0.4s,color 0.4s
}
body.dark{background:#121218;color:#ddd}
body.dark section{background:#1e1e2a;color:#ccc}

#progress-bar{
  position:fixed;top:0;left:0;width:0;height:3px;
  background:linear-gradient(90deg,#667eea,#764ba2,#4facfe);
  z-index:9999;transition:width 0.15s
}
nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(15,12,41,0.95);backdrop-filter:blur(10px);
  display:flex;justify-content:center;align-items:center;gap:0;padding:0 1rem;
  border-bottom:1px solid rgba(255,255,255,0.08)
}
nav a{
  color:rgba(255,255,255,0.7);text-decoration:none;
  padding:0.9rem 1.2rem;font-size:0.85rem;font-weight:500;
  transition:all 0.3s;border-bottom:3px solid transparent;white-space:nowrap
}
nav a:hover{color:#fff;background:rgba(255,255,255,0.06)}
#dark-toggle{
  background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;
  padding:0.35rem 0.7rem;border-radius:20px;cursor:pointer;
  font-size:0.75rem;margin-left:auto;transition:0.3s
}
#dark-toggle:hover{background:rgba(255,255,255,0.1)}
#back-top{
  position:fixed;bottom:2rem;right:2rem;z-index:999;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#667eea,#4facfe);
  color:#fff;border:none;font-size:1.4rem;cursor:pointer;
  opacity:0;transform:translateY(20px);
  transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3)
}
#back-top.show{opacity:1;transform:translateY(0)}

.hero{
  min-height:70vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:8rem 2rem 4rem;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;position:relative;overflow:hidden
}
.hero h1{font-size:3.5rem;margin-bottom:0.5rem}
.hero .sub{font-size:1.2rem;opacity:0.8;margin-bottom:2rem}

.wrap{max-width:800px;margin:0 auto;padding:3rem 1.5rem}
section{
  background:#fff;border-radius:20px;padding:3rem 2.5rem;margin-bottom:2rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.06);transition:background 0.4s;
  text-align:center
}
body.dark section{background:#1e1e2a}
.quote{
  font-size:1.4rem;line-height:2.2;max-width:650px;margin:2rem auto;
  color:#333
}
body.dark .quote{color:#ddd}
.quote::before{content:'\201C';font-size:4rem;display:block;color:#4facfe;line-height:1;margin-bottom:0.5rem}
.quote::after{content:'\201D';font-size:4rem;display:block;color:#4facfe;line-height:1;margin-top:0.5rem}
.quote-sub{
  margin-top:2rem;opacity:0.5;font-size:0.95rem
}

.back-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:2rem 0}
.back-links a{
  padding:0.8rem 1.5rem;border-radius:30px;text-decoration:none;
  font-weight:600;transition:0.3s;font-size:0.95rem
}
.back-links a:hover{transform:translateY(-3px)}
.btn-home{background:linear-gradient(135deg,#0f0c29,#302b63);color:#fff}
.btn-85{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff}
.btn-50{background:linear-gradient(135deg,#2c3e50,#4ca1af);color:#fff}
.btn-dr{background:linear-gradient(135deg,#fc4a1a,#f7b733);color:#fff}

footer{text-align:center;padding:3rem 1.5rem;color:#888;font-size:0.9rem}
footer a{color:#4facfe;text-decoration:none}

.reveal{opacity:0;transform:translateY(30px);transition:all 0.6s ease}
.reveal.show{opacity:1;transform:translateY(0)}

@media(max-width:700px){
  .hero h1{font-size:2.2rem}
  .hero .sub{font-size:1rem}
  .quote{font-size:1.1rem}
  nav a{padding:0.6rem 0.5rem;font-size:0.7rem}
  .wrap{padding:1.5rem 0.8rem}
  section{padding:2rem 1.2rem}
}
</style>
</head>
<body>

<div id="progress-bar"></div>
<button id="back-top">&8593;</button>

<nav>
  <a href="index.html">&#127968; 首頁</a>
  <a href="85.html">85大樓</a>
  <a href="50.html">50大樓</a>
  <a href="dream.html">夢時代</a>
  <button id="dark-toggle">&#9790; 深色</button>
</nav>

<div class="hero">
  <h1>學習心得文案</h1>
  <p class="sub">夜間建築部 × 網頁設計 — 跨領域學習的實踐</p>
</div>

<div class="wrap">
  <section class="reveal">
    <div class="quote">
      很高雄學校安排這種跟上時代的課表在夜間部，讓我在夜間建築部的同時也能學到平時接觸不到的領域！
    </div>
    <p class="quote-sub">從建築結構、都市發展到前端網頁技術，跨領域的學習讓視野更開闊。</p>
  </section>

  <section class="reveal">
    <h3 style="font-size:1.2rem;margin-bottom:1.5rem;border:none;padding:0">其他景點探索</h3>
    <div class="back-links">
      <a href="index.html" class="btn-home">&#127968; 回首頁</a>
      <a href="85.html" class="btn-85">85 大樓</a>
      <a href="50.html" class="btn-50">50 大樓</a>
      <a href="dream.html" class="btn-dr">夢時代</a>
    </div>
  </section>
</div>

<footer>
  <p>高雄城市地標深度探索 · 學習心得文案</p>
  <p style="margin-top:0.5rem;opacity:0.6;font-size:0.82rem">資料僅供參考，實際資訊以官方公告為準</p>
  <p style="margin-top:0.8rem"><a href="#hero">&#8593; 回頂端</a></p>
</footer>

<script>
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const p=(h.scrollTop/(h.scrollHeight-h.clientHeight))*100;
  document.getElementById('progress-bar').style.width=p+'%';
  document.getElementById('back-top').classList.toggle('show',h.scrollTop>400);
});
document.getElementById('back-top').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
const toggle=document.getElementById('dark-toggle');
toggle.addEventListener('click',()=>{
  document.body.classList.toggle('dark');
  toggle.textContent=document.body.classList.contains('dark')?'&#9790; 淺色':'&#9790; 深色';
});
const reveals=document.querySelectorAll('.reveal');
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('show')});
},{threshold:0.1});
reveals.forEach(r=>observer.observe(r));
</script>
</body>
</html>
