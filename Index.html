    <h1>高雄特色建築－高雄巨蛋</h1>

    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Kaohsiung_Arena.jpg" alt="高雄巨蛋">

    <p>
        高雄巨蛋位於高雄市左營區，是南台灣最具代表性的現代化體育與演唱會場館之一。
        建築外觀採用大型圓弧金屬屋頂設計，充滿未來科技感，
        已成為高雄重要地標。
    </p>

    <h2>建築特色</h2>

    <ul>
        <li>流線型圓頂設計，展現現代建築美學。</li>
        <li>大型無柱空間，提供寬廣視野。</li>
        <li>結合捷運與商圈，交通便利。</li>
        <li>夜間燈光效果十分壯觀。</li>
    </ul>

    <h2>主要用途</h2>

    <p>
        高雄巨蛋經常舉辦大型演唱會、國際體育賽事、
        展覽活動與文化表演，是高雄重要的娛樂中心。
    </p>

    <h2>交通資訊</h2>

    <p>
        可搭乘高雄捷運紅線至「巨蛋站」下車，
        步行即可抵達。
    </p>
